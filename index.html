<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS 每日任务训练</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="app-shell">
    <header class="glass header">
      <h1>IELTS 每日任务训练</h1>
      <p id="dateLabel"></p>
      <div class="view-tabs">
        <button id="todayTabBtn" type="button">今日任务</button>
        <button id="historyTabBtn" type="button">学习</button>
        <button id="statsTabBtn" type="button">历史</button>
      </div>
    </header>

    <section class="glass board-card" id="taskBoard">
      <div class="board-head">
        <h2>今日任务</h2>
        <p id="boardSummary"></p>
      </div>
      <div id="todayWordsPanel" class="today-words-panel hidden">
        <div class="task-top">
          <div class="task-name">今日词表完整信息</div>
          <button id="hideTodayWordsBtn" type="button">关闭</button>
        </div>
        <div id="todayWordsList" class="today-words-list"></div>
      </div>
      <div id="taskList" class="task-list"></div>
      <p class="note">任务包含：给中文拼英文 + 给英文选中文（6选1，选项来自当前词表）。</p>
    </section>

    <section class="glass board-card" id="historyBoard">
      <div class="board-head">
        <h2>学习</h2>
        <p id="historySummary"></p>
      </div>
      <p class="note">从 Word List 01-48 中任选一个词表开始复习测试。</p>
      <div id="historyPendingList" class="task-list"></div>
    </section>

    <section class="glass board-card hidden" id="statsBoard">
      <div class="board-head">
        <h2>历史</h2>
        <p id="statsSummary"></p>
      </div>
      <label class="input-label" for="historyDateInput">选择日期</label>
      <input id="historyDateInput" type="date" />
      <div class="history-columns">
        <div>
          <h3>当日已完成词表</h3>
          <div id="statsList" class="task-list"></div>
        </div>
        <div>
          <h3>遗忘曲线建议复习</h3>
          <div id="reviewSuggestList" class="task-list"></div>
        </div>
      </div>
    </section>

    <section class="glass quiz-card hidden" id="quizCard">
      <div class="quiz-head">
        <div>
          <h2 id="taskTitle"></h2>
          <p id="taskMeta"></p>
        </div>
        <button id="resetTaskBtn" type="button">重新开始</button>
      </div>

      <div class="top-row">
        <span id="progressText">1 / 30</span>
        <span id="scoreText">正确: 0</span>
        <span id="timerText">用时: 00:00</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="prompt" id="promptText"></div>

      <div class="hints" id="spellingHints">
        <div class="hint-item">拼写提示: <b id="wordMask">-</b></div>
      </div>

      <div id="spellingWrap">
        <label class="input-label" for="answerInput">请输入完整单词</label>
        <input id="answerInput" type="text" autocomplete="off" spellcheck="false" />
      </div>

      <div id="mcqWrap" class="mcq-wrap hidden">
        <p class="input-label">请选择正确中文：</p>
        <div id="mcqOptions" class="mcq-options"></div>
      </div>

      <p id="feedback" class="feedback"></p>

      <div class="actions">
        <button id="submitBtn">提交</button>
        <button id="nextBtn" disabled>下一题</button>
        <button id="quitBtn">返回任务列表</button>
      </div>
    </section>

    <section class="glass result-card hidden" id="resultCard">
      <h2 id="resultTitle">任务完成</h2>
      <p id="finalScore"></p>
      <div id="wrongList"></div>
      <button id="backBoardBtn">返回任务列表</button>
    </section>
  </main>

  <script src="wordlist.js"></script>
  <script src="app.js"></script>
</body>
</html>
